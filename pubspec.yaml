name: weather_app
description: A real-time weather application with Firebase backend and user authentication
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  # UI & State Management
  provider: ^6.1.2
  flutter_staggered_animations: ^1.1.1
  
  # Networking & API
  http: ^1.2.1
  
  # Location Services
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.1.6
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Utilities
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  path_provider: ^2.1.2
  
flutter:
  uses-material-design: true